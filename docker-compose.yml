version: '3.8'

services:
  remote-runner:
    build: .
    container_name: remote-runner-container
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
      # Fondamentale: protegge i moduli installati nel container
      - /app/node_modules 
    restart: always
