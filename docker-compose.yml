services:
  remote-runner:
    build: .
    container_name: remote-runner-container
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Passiamo solo il "cuore" di Docker
      - /var/run/docker.sock:/var/run/docker.sock
      # Mappa la cartella per i file
      - .:/app
      - /app/node_modules
    restart: always
